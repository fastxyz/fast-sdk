name: Release

on:
  push:
    branches:
      - main
      - 'release/*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publishing
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # On main: create Version PR (if changesets exist) or publish (if versions bumped)
      - name: Create Release PR or Publish
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish --provenance --access public
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On release/* branches: publish prerelease directly
      # Branch must have `changeset pre enter <tag>` + `changeset version` committed
      - name: Publish Prerelease
        if: startsWith(github.ref, 'refs/heads/release/')
        run: pnpm changeset publish --provenance --access public