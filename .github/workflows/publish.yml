name: Publish

on:
  push:
    branches:
      - main
      - 'release/*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publishing
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Guard: ensure pre-release mode is not active on main
      - name: Check for pre-release mode
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "::error::pre.json detected on main branch. Run 'pnpm pub:exit-pre' before merging."
            exit 1
          fi

      # main: Version PR + publish stable
      - name: Create Release PR or Publish
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish --provenance --access public
          version: pnpm changeset version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # release/*: publish pre-release (versioning handled by version.yml)
      - name: Publish Pre-Release
        if: startsWith(github.ref, 'refs/heads/release/')
        run: pnpm changeset publish --provenance --access public