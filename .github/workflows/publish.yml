name: Publish

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm
        run: npm install --global npm@11.5.2

      - name: Verify tag matches package version
        run: npm run release:verify-tag

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check publish tarball
        run: npm run pack:dry-run

      - name: Smoke-test package
        run: npm run pack:smoke

      - name: Publish to npm
        run: npm publish --access public --provenance
