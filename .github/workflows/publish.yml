name: Publish

on:
  push:
    branches:
      - main
      - 'release/*'

permissions:
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publishing
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      # Skip if there are pending changesets (version.yml handles those)
      - name: Check for pending changesets
        id: changesets
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets found — skipping publish (version.yml will create a Version PR)."
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — proceeding to publish."
          fi

      - name: Build
        if: steps.changesets.outputs.pending == 'false'
        run: pnpm build

      - name: Test
        if: steps.changesets.outputs.pending == 'false'
        run: pnpm test

      - name: Publish to npm
        if: steps.changesets.outputs.pending == 'false'
        run: pnpm changeset publish --provenance --access public