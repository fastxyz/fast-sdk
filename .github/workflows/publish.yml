name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publishing
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Publish packages
        run: |
          # Iterate all workspace packages and publish those with unpublished versions.
          # Determines the npm dist-tag from the version's prerelease identifier:
          #   2.0.0-testnet.1  →  --tag testnet
          #   1.1.0-beta.1     →  --tag beta
          #   2.0.0            →  --tag latest

          for pkg_dir in packages/*/; do
            pkg_json="${pkg_dir}package.json"
            [ -f "$pkg_json" ] || continue

            name=$(jq -r '.name // empty' "$pkg_json")
            version=$(jq -r '.version // empty' "$pkg_json")
            private=$(jq -r '.private // false' "$pkg_json")

            [ -z "$name" ] || [ -z "$version" ] && continue
            [ "$private" = "true" ] && continue

            # Check if this exact version is already on npm
            if npm view "${name}@${version}" version 2>/dev/null | grep -q "$version"; then
              echo "⏭️  ${name}@${version} already published, skipping"
              continue
            fi

            # Determine dist-tag from prerelease identifier
            if [[ "$version" == *"-"* ]]; then
              # Extract alphabetic prerelease tag (e.g., "testnet" from "2.0.0-testnet.1")
              dist_tag=$(echo "$version" | sed 's/^[^-]*-\([a-zA-Z]*\).*/\1/')
              [ -z "$dist_tag" ] && dist_tag="next"
            else
              dist_tag="latest"
            fi

            echo "📦 Publishing ${name}@${version} with --tag ${dist_tag}"
            (cd "$pkg_dir" && pnpm publish --no-git-checks --tag "$dist_tag" --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
